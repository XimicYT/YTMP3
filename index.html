<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educational YT Downloader</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .converter-box {
            background: #16213e;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        h2 { margin-top: 0; color: #e94560; }
        input {
            width: 90%;
            padding: 12px;
            margin: 20px 0;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            background: #0f3460;
            color: #fff;
        }
        input::placeholder { color: #888; }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.3s;
        }
        button:hover { background: #d33c54; }
        #status {
            margin-top: 20px;
            font-size: 0.95rem;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="converter-box">
        <h2>Self-Hosted Audio Engine</h2>
        <p>Powered by YouTube.js</p>
        <input type="text" id="videoUrl" placeholder="Paste YouTube Link...">
        <button id="convertBtn">Download Audio (M4A)</button>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('convertBtn').addEventListener('click', () => {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const status = document.getElementById('status');

            if (!urlInput || !urlInput.includes('youtu')) {
                alert("Please paste a valid YouTube link!");
                return;
            }

            status.innerHTML = "Connecting to InnerTube...<br><small>Your download will start automatically.</small>";

            // By setting the window location, the browser sends a GET request.
            // When the server responds with 'Content-Disposition: attachment', 
            // the browser knows to download it instead of leaving the page!
            const downloadUrl = `/api/download?url=${encodeURIComponent(urlInput)}`;
            window.location.href = downloadUrl;
            
            setTimeout(() => {
                status.innerText = "Download triggered! You can paste another link.";
                document.getElementById('videoUrl').value = '';
            }, 3000);
        });
    </script>
</body>
</html>
